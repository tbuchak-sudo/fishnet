    <style>

</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex overflow-hidden">

            <!-- АНАЛІТИКА -->
            <div id="tab-analytics" class="tab-content">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-bold text-lg text-gray-800">Аналітика (Реальний VPD та Ґрунт - Зона 1)</h3>
                    </div>
                    <div class="w-full h-[400px]">
                        <canvas id="mainChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- PRO-LEVEL ARCHITECTURE v4 -->
    <script>
        // --- 1. БЕЗПЕКА: AUTH FLOW (Симуляція) ---
        const Auth = {
            getToken() {
                let token = localStorage.getItem('agro_jwt_token');
                if (!token) {
                    // У реальному світі тут редірект на /login. Ми симулюємо генерацію токена.
                    token = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.simulated_token_" + Date.now();
                    localStorage.setItem('agro_jwt_token', token);
                    Logger.add('AUTH', 'Згенеровано новий JWT токен сесії.');
                }
                return token;
            },
            getHeaders() {
                return { 'Authorization': `Bearer ${this.getToken()}` };
            }
        };

        // --- 2. PWA (ПРОГРЕСИВНИЙ ВЕБ-ДОДАТОК з кешуванням) ---
        const PWA = {
            deferredPrompt: null,

            init() {
                this.injectManifest();
                this.registerServiceWorker();
                this.setupInstallPrompt();
            },

            injectManifest() {
                const manifest = {
                    name: "Agro-Controller PRO v4",
                    short_name: "AgroPRO",
                    start_url: window.location.href,
                    display: "standalone",
                    background_color: "#f9fafb",
                    theme_color: "#14532d",
                    icons: [{
                        src: "data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2316a34a'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z'/%3E%3C/svg%3E",
                        sizes: "192x192",
                        type: "image/svg+xml",
                        purpose: "any maskable"
                    }]
                };

                const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
                const manifestUrl = URL.createObjectURL(blob);
                const link = document.createElement('link');
                link.rel = 'manifest';
                link.href = manifestUrl;
                document.head.appendChild(link);
            },

            // PRO SW: Кешування ассетів для роботи офлайн
            registerServiceWorker() {
                if ('serviceWorker' in navigator) {
                    const swCode = `
                        const CACHE_NAME = 'agro-pro-cache-v4';
                        // Кешуємо поточний URL (оскільки це Single File)
                        const ASSETS = [ location.href ];
                        
                        self.addEventListener('install', (e) => {
                            e.waitUntil(
                                caches.open(CACHE_NAME).then(cache => cache.addAll(ASSETS))
                            );
                            self.skipWaiting();
                        });

                        self.addEventListener('activate', (e) => {
                            e.waitUntil(clients.claim());
                        });

                        self.addEventListener('fetch', (e) => {
                            e.respondWith(
                                caches.match(e.request).then(res => {
                                    return res || fetch(e.request).catch(() => new Response('Network Error'));
                                })
                            );
                        });
                    `;
                    const swBlob = new Blob([swCode], { type: 'application/javascript' });
                    const swUrl = URL.createObjectURL(swBlob);

                    navigator.serviceWorker.register(swUrl)
                        .then(reg => console.log('[PWA] Service Worker з кешуванням зареєстровано'))
                        .catch(err => console.error('[PWA] SW Error:', err));
                }
            },

            setupInstallPrompt() {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    this.deferredPrompt = e;
                    const installBtn = document.getElementById('pwa-install-btn');
                    if (installBtn) {
                        installBtn.classList.remove('hidden');
                        installBtn.addEventListener('click', async () => {
                            installBtn.classList.add('hidden');
                            this.deferredPrompt.prompt();
                            const { outcome } = await this.deferredPrompt.userChoice;
                            if (outcome === 'accepted') {
                                Logger.add('INFO', '🎉 Agro-Controller PWA встановлено.');
                            }
                            this.deferredPrompt = null;
                        });
                    }
                });
                window.addEventListener('appinstalled', () => {
                    document.getElementById('pwa-install-btn').classList.add('hidden');
                });
            }
        };

        // --- 3. CONFIG та Стан ---
        const CONFIG = {
            VPD_OPTIMAL: [0.8, 1.2],
            HYSTERESIS: { ON: 45, OFF: 65 },
            WS_PING_INTERVAL: 2000,
            HEARTBEAT_TIMEOUT: 6000, // Чекаємо Pong 6 секунд
            TOGGLE_DELAY: 5000, 
            MAX_CHART_POINTS: 30,
            TANK_MAX: 1000,
            TANK_MIN: 100,
            MAX_MISSED_PINGS: 3 // Retry Logic для Watchdog
        };

        const Logger = {
            logs: [],
            add(level, message) {
                const now = new Date();
                const time = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
                const logEntry = `[${time}] [${level}] ${message}`;
                
                this.logs.unshift(logEntry);
                if (this.logs.length > 50) this.logs.pop(); 
                
                requestAnimationFrame(() => {
                    const logsContainer = document.getElementById('system-logs');
                    if (logsContainer) {
                        let html = '';
                        this.logs.forEach(log => {
                            const color = log.includes('[ERROR]') ? 'text-red-400' : 
                                          log.includes('[WARN]') ? 'text-yellow-400' : 
                                          log.includes('[AUTH]') ? 'text-purple-400' :
                                          log.includes('[NET]') ? 'text-cyan-400' : 'text-green-400';
                            html += `<div class="${color}">${log}</div>`;
                        });
                        logsContainer.innerHTML = html;
                    }
                });
            }
        };

        let saveTimeout;
        const Storage = {
            scheduleSave() {
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(this.save, 2000);
            },
            save() {
                const dataToSave = {
                    tankLevel: State.tankLevel,
                    zones: State.zones
                };
                localStorage.setItem('agroStatePRO_v4', JSON.stringify(dataToSave));
            },
            load() {
                const saved = localStorage.getItem('agroStatePRO_v4');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (parsed.tankLevel) State.tankLevel = parsed.tankLevel;
                        if (parsed.zones) {
                            Object.keys(parsed.zones).forEach(key => {
                                if (State.zones[key]) {
                                    State.zones[key].moisture = parsed.zones[key].moisture;
                                    State.zones[key].rawMoisture = parsed.zones[key].moisture;
                                    State.zones[key].temp = parsed.zones[key].temp;
                                    State.zones[key].isWatering = false; 
                                    State.zones[key].status = 'IDLE';
                                    State.zones[key].missedPings = 0; // Скидаємо лічильники Watchdog
                                }
                            });
                        }
                        Logger.add('INFO', 'Стан відновлено з локального кешу');
                    } catch (e) {
                        Logger.add('ERROR', 'Помилка читання кешу');
                    }
                }
            }
        };

        const State = {
            isOnline: false,
            weather: { isRaining: false, probability: 0, rainInMinutes: 999 },
            tankLevel: 200,
            zones: {
                z1: { id: 'z1', name: 'Теплиця (Огірки)', loraId: 'A1', rawMoisture: 48, moisture: 48, airHumidity: 65, trend: 0, temp: 24.5, vpd: 0.9, isWatering: false, status: 'IDLE', lastToggleTime: 0, lastSeen: Date.now(), missedPings: 0 },
                z2: { id: 'z2', name: 'Відкритий ґрунт (Томати)', loraId: 'B2', rawMoisture: 62, moisture: 62, airHumidity: 55, trend: 0, temp: 26.2, vpd: 1.3, isWatering: false, status: 'IDLE', lastToggleTime: 0, lastSeen: Date.now(), missedPings: 0 }
            },
            chartInstance: null
        };

        const DOM = { zones: {} };

        // --- 4. МАТЕМАТИКА VPD (Реальна формула) ---
        const AgroMath = {
            calculateVPD(tempCelsius, relHumidity) {
                // SVP (Saturation Vapor Pressure) в kPa
                const svp = 0.61078 * Math.exp((17.27 * tempCelsius) / (tempCelsius + 237.3));
                // AVP (Actual Vapor Pressure)
                const avp = svp * (relHumidity / 100);
                // VPD = SVP - AVP
                return (svp - avp);
            }
        };

        // --- 5. МЕРЕЖА: WebSocket Gateway з Exponential Backoff ---
        const NetworkWS = {
            intervalId: null,
            reconnectTimer: null,
            retries: 0,
            
            connect() {
                if (this.reconnectTimer) clearTimeout(this.reconnectTimer);
                UI.setConnectionStatus('connecting');
                Logger.add('NET', 'Ініціалізація WS Gateway (Handshake)...');
                
                // Імітуємо перевірку Auth токена
                const token = Auth.getToken();
                
                setTimeout(() => {
                    State.isOnline = true;
                    this.retries = 0; // Скидаємо лічильник після успіху
                    document.getElementById('reconnect-bar').style.width = '0%';
                    
                    UI.setConnectionStatus('connected');
                    Logger.add('NET', 'WS З\'єднано. Heartbeat активний.');
                    
                    Object.values(State.zones).forEach(z => {
                        z.lastSeen = Date.now();
                        z.missedPings = 0;
                    });

                    this.intervalId = setInterval(() => {
                        this.simulateIncomingData();
                    }, CONFIG.WS_PING_INTERVAL);
                }, 800);
            },
            
            disconnect() {
                State.isOnline = false;
                clearInterval(this.intervalId);
                UI.setConnectionStatus('disconnected');
                
                // Exponential Backoff Логіка: 1s, 2s, 4s, 8s, 16s... Max 30s
                const baseDelay = 1000;
                const maxDelay = 30000;
                const delay = Math.min(maxDelay, baseDelay * Math.pow(2, this.retries));
                
                Logger.add('ERROR', `WS Зрив. Reconnect через ${(delay/1000).toFixed(1)}с (Спроба ${this.retries + 1})`);
                
                // Анімація прогресу реконекту
                const bar = document.getElementById('reconnect-bar');
                bar.style.transition = `width ${delay}ms linear`;
                bar.style.width = '100%';
                
                this.reconnectTimer = setTimeout(() => {
                    bar.style.transition = 'none';
                    bar.style.width = '0%';
                    this.retries++;
                    this.connect();
                }, delay);
                
                UI.render();
            },

            async send(command, payload) {
                // Використовуємо реальний Auth Header
                const headers = Auth.getHeaders();
                Logger.add('CMD', `[LoRa Queue] CMD: ${command} | Zone: ${payload.id}`);
                
                return new Promise((resolve) => {
                    const loraDelay = 800 + Math.random() * 700;
                    setTimeout(() => {
                        Logger.add('NET', `ACK Received. Hashed Token Validation OK.`);
                        resolve({ success: true });
                    }, loraDelay);
                });
            },

            simulateIncomingData() {
                if (document.hidden) return; 

                Object.values(State.zones).forEach(zone => {
                    const prevMoisture = zone.moisture;
                    const noiseM = (Math.random() - 0.5) * 4;
                    
                    if (zone.isWatering) {
                        zone.rawMoisture += 2.5 + noiseM;
                        State.tankLevel -= 2; 
                        zone.airHumidity += 0.5; // Полив локально піднімає вологість повітря
                    } else {
                        zone.rawMoisture -= 0.5 + noiseM;
                        zone.airHumidity -= 0.2; 
                    }
                    
                    zone.rawMoisture = Math.max(0, Math.min(100, zone.rawMoisture));
                    zone.airHumidity = Math.max(30, Math.min(100, zone.airHumidity));

                    const diff = Math.abs(zone.rawMoisture - zone.moisture);
                    const dynamicAlpha = diff > 4 ? 0.4 : 0.1;
                    zone.moisture = (dynamicAlpha * zone.rawMoisture) + ((1 - dynamicAlpha) * zone.moisture);

                    zone.trend = zone.moisture - prevMoisture;

                    zone.temp += (Math.random() * 0.4 - 0.2);
                    
                    // PRO: Реальний математичний розрахунок VPD
                    zone.vpd = AgroMath.calculateVPD(zone.temp, zone.airHumidity);

                    // Отримано пакет = скидаємо Watchdog
                    zone.lastSeen = Date.now();
                    zone.missedPings = 0; 
                });

                Storage.scheduleSave();
                Logic.processSensors();
                UI.render();
            }
        };

        const WeatherService = {
            async fetch() {
                // Симуляція запиту до OpenWeather API
                State.weather.probability = Math.floor(Math.random() * 100);
                State.weather.rainInMinutes = Math.floor(Math.random() * 120);
                State.weather.isRaining = State.weather.probability > 80 && State.weather.rainInMinutes === 0; 
                UI.updateWeatherWidget();
                Logger.add('NET', `Weather API Sync OK. Cloud/Rain Index: ${State.weather.probability}%`);
            }
        };

        // --- 6. LOGIC: Watchdog Retry, ET ---
        const Logic = {
            shouldStartWatering(zone) {
                if (State.weather.rainInMinutes < 60 && State.weather.probability > 60) return false;
                if (State.tankLevel < CONFIG.TANK_MIN) return false;
                
                let dynamicOnThreshold = CONFIG.HYSTERESIS.ON;
                
                if (zone.vpd > 1.6) dynamicOnThreshold += 10; 
                else if (zone.vpd < 0.7) dynamicOnThreshold -= 5;  

                if (zone.temp > 28 && State.weather.probability < 30) dynamicOnThreshold += 5; 

                const predictedMoisture = zone.moisture + (zone.trend * 15);
                return predictedMoisture < dynamicOnThreshold;
            },

            processSensors() {
                const now = Date.now();

                Object.values(State.zones).forEach(zone => {
                    
                    // PRO: Watchdog із логікою Retry
                    if (now - zone.lastSeen > CONFIG.WS_PING_INTERVAL * 2 && State.isOnline) {
                        zone.missedPings++;
                        if (zone.missedPings >= CONFIG.MAX_MISSED_PINGS) {
                            if (zone.isWatering) {
                                zone.isWatering = false;
                                Logger.add('ERROR', `[WATCHDOG KILL] LoRa Node ${zone.id} Dead. Аварійне перекриття води.`);
                            }
                            zone.status = 'OFFLINE';
                            return; 
                        } else {
                            Logger.add('WARN', `[WATCHDOG] Пропущено пінг від ${zone.id} (${zone.missedPings}/${CONFIG.MAX_MISSED_PINGS})`);
                        }
                    }

                    if (State.tankLevel < CONFIG.TANK_MIN) {
                        if (zone.isWatering) {
                            zone.isWatering = false;
                            Logger.add('WARN', `FAIL-SAFE: Помпа зупинена. Бак порожній.`);
                            NetworkWS.send('RELAY_SET', { id: zone.id, state: false });
                        }
                        zone.status = 'LOW_WATER';
                    } else if(zone.status !== 'OFFLINE') {
                        const canToggle = (now - zone.lastToggleTime > CONFIG.TOGGLE_DELAY);

                        if (!zone.isWatering && this.shouldStartWatering(zone) && canToggle) {
                            zone.isWatering = true;
                            zone.lastToggleTime = now;
                            Logger.add('INFO', `[AUTO] Старт поливу ${zone.name}. Прогноз вологості критичний.`);
                            NetworkWS.send('RELAY_SET', { id: zone.id, state: true });
                        } else if (zone.isWatering && zone.moisture >= CONFIG.HYSTERESIS.OFF && canToggle) {
                            zone.isWatering = false;
                            zone.lastToggleTime = now;
                            Logger.add('INFO', `[AUTO] Стоп поливу ${zone.name}. Цільовий рівень гістерезису досягнуто.`);
                            NetworkWS.send('RELAY_SET', { id: zone.id, state: false });
                        }

                        zone.status = zone.isWatering ? 'WATERING' : 'IDLE';
                    }
                });
            },

            async handleManualWatering(zoneId) {
                if (!State.isOnline) {
                    alert("Мережевий шлюз недоступний. Команда відхилена.");
                    return;
                }

                const zone = State.zones[zoneId];
                const now = Date.now();
                
                if (zone.status === 'OFFLINE') {
                    alert("LoRa вузол не відповідає на Heartbeat. Команда неможлива.");
                    return;
                }

                if (now - zone.lastToggleTime < CONFIG.TOGGLE_DELAY) {
                    Logger.add('WARN', `Anti-Spam Relay Protection: Зачекайте ${CONFIG.TOGGLE_DELAY/1000}с.`);
                    return;
                }
                
                if (State.tankLevel < CONFIG.TANK_MIN && !zone.isWatering) {
                    alert("Interlock: Рівень води занадто низький!");
                    return;
                }

                const newState = !zone.isWatering;
                
                const btnObj = DOM.zones[zoneId].btn;
                if(btnObj) btnObj.disabled = true;

                const res = await NetworkWS.send('RELAY_SET', { id: zoneId, state: newState });
                
                if (res.success) {
                    zone.isWatering = newState;
                    zone.status = zone.isWatering ? 'WATERING' : 'IDLE';
                    zone.lastToggleTime = now;
                    Logger.add('INFO', `[MANUAL_OVERRIDE] Клапан ${zone.id} -> ${newState ? 'OPEN' : 'CLOSED'}`);
                    UI.render(); 
                }
                
                if(btnObj) btnObj.disabled = false;
            }
        };

        // --- 7. UI (Rendering & Cache) ---
        const UI = {
            lastValues: {},
            titles: { 'dashboard': 'Огляд системи', 'zones': 'Управління клапанами', 'analytics': 'Аналітика (VPD/ET)' },

            init() {
                DOM.dashMoisture = document.getElementById('dash-moisture');
                DOM.dashTemp = document.getElementById('dash-temp');
                DOM.dashVpd = document.getElementById('dash-vpd');
                DOM.dashTank = document.getElementById('dash-tank');
                DOM.tankBar = document.getElementById('tank-bar');
                DOM.connIndicator = document.getElementById('conn-indicator');
                DOM.connText = document.getElementById('conn-text');
                DOM.weatherStatus = document.getElementById('weather-status');

                this.initZonesUI();
                this.initChart();
            },

            initZonesUI() {
                const container = document.getElementById('zones-container');
                container.innerHTML = ''; 

                Object.values(State.zones).forEach(zone => {
                    const html = `
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                        <div class="border-b border-gray-100 p-5 flex justify-between items-center bg-gray-50">
                            <div class="flex items-center gap-3">
                                <div id="${zone.id}-indicator" class="w-3 h-3 rounded-full bg-gray-400"></div>
                                <h3 class="font-bold text-lg text-gray-800">${zone.name}</h3>
                            </div>
                            <span class="text-xs font-bold px-2 py-1 bg-gray-200 rounded-md text-gray-600 font-mono">NODE:${zone.loraId}</span>
                        </div>
                        <div class="p-6">
                            <div class="grid grid-cols-2 gap-4 mb-6">
                                <div class="p-4 rounded-xl bg-blue-50 border border-blue-100 relative">
                                    <p class="text-xs text-blue-600 font-bold mb-1 uppercase tracking-wider">Ґрунт (EMA)</p>
                                    <div class="flex items-end gap-2">
                                        <span class="text-3xl font-black text-gray-800" id="${zone.id}-moisture">--</span>
                                        <span class="text-lg text-gray-500 mb-1">%</span>
                                    </div>
                                    <div class="w-full bg-blue-200 rounded-full h-1.5 mt-3">
                                        <div class="bg-blue-600 h-1.5 rounded-full transition-all duration-300" id="${zone.id}-bar" style="width: 0%"></div>
                                    </div>
                                </div>
                                <div class="p-4 rounded-xl bg-orange-50 border border-orange-100 relative">
                                    <p class="text-xs text-orange-600 font-bold mb-1 uppercase tracking-wider">Температура</p>
                                    <div class="flex items-end gap-2">
                                        <span class="text-3xl font-black text-gray-800" id="${zone.id}-temp">--</span>
                                        <span class="text-lg text-gray-500 mb-1">°C</span>
                                    </div>
                                    <div class="mt-2 text-xs text-orange-700">Влог. Повітря: <span id="${zone.id}-air">--</span>%</div>
                                </div>
                            </div>
                            <div class="flex items-center justify-between pt-4 border-t border-gray-100">
                                <div>
                                    <p class="text-sm font-medium text-gray-800">Статус: <span id="${zone.id}-status" class="text-gray-500">Очікування</span></p>
                                </div>
                                <button onclick="Logic.handleManualWatering('${zone.id}')" id="btn-water-${zone.id}" class="px-5 py-2.5 bg-agro-600 hover:bg-agro-700 text-white rounded-xl font-medium transition-colors shadow-sm flex items-center gap-2">
                                    <i data-lucide="power" class="w-4 h-4"></i> <span id="btn-text-${zone.id}">Увімкнути</span>
                                </button>
                            </div>
                        </div>
                    </div>`;
                    container.insertAdjacentHTML('beforeend', html);
                    
                    DOM.zones[zone.id] = {
                        moisture: document.getElementById(`${zone.id}-moisture`),
                        air: document.getElementById(`${zone.id}-air`),
                        bar: document.getElementById(`${zone.id}-bar`),
                        temp: document.getElementById(`${zone.id}-temp`),
                        status: document.getElementById(`${zone.id}-status`),
                        btn: document.getElementById(`btn-water-${zone.id}`),
                        btnText: document.getElementById(`btn-text-${zone.id}`),
                        indicator: document.getElementById(`${zone.id}-indicator`)
                    };
                });
                lucide.createIcons();
            },

            switchTab(tabId) {
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.remove('bg-agro-700', 'text-white');
                    btn.classList.add('text-agro-100');
                });
                
                const activeBtn = document.getElementById('nav-' + tabId);
                if(activeBtn) {
                    activeBtn.classList.remove('text-agro-100');
                    activeBtn.classList.add('bg-agro-700', 'text-white');
                }
                document.getElementById('page-title').innerText = this.titles[tabId];

                document.querySelectorAll('.tab-content').forEach(content => {
                    content.classList.remove('active');
                });
                document.getElementById('tab-' + tabId).classList.add('active');
            },

            setConnectionStatus(status) {
                requestAnimationFrame(() => {
                    if (status === 'connected') {
                        DOM.connIndicator.innerHTML = '<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>';
                        DOM.connText.innerHTML = '<i data-lucide="wifi" class="w-3 h-3"></i> Підключено (JWT)';
                        DOM.connText.className = "text-xs text-green-400 flex items-center gap-1 relative z-10";
                    } else if (status === 'disconnected') {
                        DOM.connIndicator.innerHTML = '<span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>';
                        DOM.connText.innerHTML = '<i data-lucide="wifi-off" class="w-3 h-3"></i> Зрив зв\'язку';
                        DOM.connText.className = "text-xs text-red-400 flex items-center gap-1 relative z-10";
                    } else {
                        DOM.connIndicator.innerHTML = '<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-yellow-500"></span>';
                        DOM.connText.innerHTML = '<i data-lucide="loader" class="w-3 h-3 animate-spin"></i> З\'єднання...';
                        DOM.connText.className = "text-xs text-yellow-400 flex items-center gap-1 relative z-10";
                    }
                    lucide.createIcons();
                });
            },

            updateWeatherWidget() {
                const isBlock = State.weather.rainInMinutes < 60 && State.weather.probability > 60;
                const newClass = isBlock 
                    ? "flex items-center gap-2 text-sm font-medium text-blue-700 bg-blue-100 px-3 py-1.5 rounded-full transition-colors"
                    : "flex items-center gap-2 text-sm font-medium text-green-700 bg-green-100 px-3 py-1.5 rounded-full transition-colors";
                
                if(this.lastValues.weatherClass !== newClass) {
                    this.lastValues.weatherClass = newClass;
                    requestAnimationFrame(() => {
                        DOM.weatherStatus.className = newClass;
                        DOM.weatherStatus.innerHTML = isBlock
                            ? `<i data-lucide="cloud-rain" class="w-4 h-4"></i><span>Дощ через ${State.weather.rainInMinutes} хв.</span>`
                            : `<i data-lucide="sun" class="w-4 h-4"></i><span>Clear Sky API</span>`;
                        lucide.createIcons();
                    });
                }
            },

            render() {
                const tnkInt = Math.floor(State.tankLevel);
                let avgMoisture = 0, avgTemp = 0, maxVpd = 0;
                const zonesArr = Object.values(State.zones);
                
                zonesArr.forEach(z => {
                    avgMoisture += z.moisture;
                    avgTemp += z.temp;
                    if(z.vpd > maxVpd) maxVpd = z.vpd;
                });
                avgMoisture = Math.floor(avgMoisture / zonesArr.length);
                avgTemp = (avgTemp / zonesArr.length).toFixed(1);
                maxVpd = maxVpd.toFixed(2);

                requestAnimationFrame(() => {
                    if (this.lastValues.avgM !== avgMoisture) { DOM.dashMoisture.innerText = avgMoisture; this.lastValues.avgM = avgMoisture; }
                    if (this.lastValues.avgT !== avgTemp) { DOM.dashTemp.innerText = avgTemp; this.lastValues.avgT = avgTemp; }
                    if (this.lastValues.maxV !== maxVpd) { DOM.dashVpd.innerText = maxVpd; this.lastValues.maxV = maxVpd; }
                    if (this.lastValues.tank !== tnkInt) { 
                        DOM.dashTank.innerText = tnkInt; 
                        DOM.tankBar.style.width = `${(tnkInt/CONFIG.TANK_MAX)*100}%`;
                        if(tnkInt < CONFIG.TANK_MIN) DOM.tankBar.classList.replace('bg-cyan-500', 'bg-red-500');
                        else DOM.tankBar.classList.replace('bg-red-500', 'bg-cyan-500');
                        this.lastValues.tank = tnkInt; 
                    }

                    zonesArr.forEach(z => {
                        const domZ = DOM.zones[z.id];
                        if (!domZ) return;

                        const mInt = Math.floor(z.moisture);
                        const aInt = Math.floor(z.airHumidity);
                        const tFixed = z.temp.toFixed(1);
                        const cacheKey = `z_${z.id}`;

                        if(!this.lastValues[cacheKey]) this.lastValues[cacheKey] = {};

                        if (this.lastValues[cacheKey].moisture !== mInt) {
                            domZ.moisture.innerText = mInt;
                            domZ.bar.style.width = `${mInt}%`;
                            this.lastValues[cacheKey].moisture = mInt;
                        }
                        
                        if (this.lastValues[cacheKey].air !== aInt) {
                            domZ.air.innerText = aInt;
                            this.lastValues[cacheKey].air = aInt;
                        }

                        if (this.lastValues[cacheKey].temp !== tFixed) {
                            domZ.temp.innerText = tFixed;
                            this.lastValues[cacheKey].temp = tFixed;
                        }

                        if (this.lastValues[cacheKey].status !== z.status || !State.isOnline) {
                            domZ.btn.className = "px-5 py-2.5 rounded-xl font-medium transition-colors shadow-sm flex items-center gap-2 text-white";
                            domZ.btn.disabled = false;
                            domZ.indicator.className = "w-3 h-3 rounded-full";

                            if (!State.isOnline || z.status === 'OFFLINE') {
                                domZ.status.innerHTML = '<span class="text-gray-500">Офлайн / Timeout</span>';
                                domZ.btn.classList.add('bg-gray-400');
                                domZ.btn.disabled = true;
                                domZ.btnText.innerText = "No Route";
                                domZ.indicator.classList.add('bg-gray-400');
                            }
                            else if (z.status === 'LOW_WATER') {
                                domZ.status.innerHTML = '<span class="text-red-500 font-bold">Interlock: Бак</span>';
                                domZ.btn.classList.add('bg-red-300');
                                domZ.btn.disabled = true; 
                                domZ.btnText.innerText = "Блок";
                                domZ.indicator.classList.add('bg-red-500');
                            } else if (z.status === 'WATERING') {
                                domZ.status.innerHTML = '<span class="text-blue-500 font-bold">Відкрито...</span>';
                                domZ.btn.classList.add('bg-red-500', 'hover:bg-red-600');
                                domZ.btnText.innerText = "Вимкнути";
                                domZ.indicator.classList.add('bg-blue-500', 'animate-pulse');
                            } else {
                                domZ.status.innerHTML = 'Очікування';
                                domZ.btn.classList.add('bg-agro-600', 'hover:bg-agro-700');
                                domZ.btnText.innerText = "Увімкнути";
                                domZ.indicator.classList.add('bg-green-500');
                            }
                            this.lastValues[cacheKey].status = z.status;
                        }
                    });
                });

                this.updateChartLive(State.zones.z1.moisture, State.zones.z1.vpd);
            },

            initChart() {
                const ctx = document.getElementById('mainChart').getContext('2d');
                State.chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: [],
                        datasets: [
                            {
                                label: 'Зона 1: Ґрунт (%) EMA', data: [],
                                borderColor: '#2563eb', backgroundColor: 'rgba(37, 99, 235, 0.1)',
                                yAxisID: 'y', tension: 0.4, fill: true
                            },
                            {
                                label: 'Зона 1: Real VPD (kPa)', data: [],
                                borderColor: '#9333ea',
                                yAxisID: 'y1', tension: 0.4, borderDash: [5, 5]
                            }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false, animation: { duration: 0 }, 
                        scales: {
                            y: { min: 0, max: 100 },
                            y1: { position: 'right', min: 0, max: 2.5, grid: { drawOnChartArea: false } }
                        }
                    }
                });
            },

            updateChartLive(moisture, vpd) {
                if (!State.chartInstance || !State.isOnline) return;

                const now = new Date();
                const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2, '0')}`;
                const data = State.chartInstance.data;

                data.labels.push(timeStr);
                data.datasets[0].data.push(moisture);
                data.datasets[1].data.push(vpd.toFixed(2)); // VPD з 2 знаками

                if (data.labels.length > CONFIG.MAX_CHART_POINTS) {
                    data.labels.shift();
                    data.datasets[0].data.shift();
                    data.datasets[1].data.shift();
                }

                State.chartInstance.update('none');
            }
        };

        // --- 8. APP INIT ---
        document.addEventListener("DOMContentLoaded", async () => {
            Logger.add('INFO', 'Boot sequence: Agro-Controller PRO v4');
            
            // 1. Init Security (Імітація перевірки токена)
            Auth.getToken();

            // 2. Init PWA (Повноцінний кеш)
            PWA.init();
            
            // 3. Відновлення стану
            Storage.load(); 
            UI.init();
            
            // 4. Зовнішні API
            await WeatherService.fetch();
            setInterval(WeatherService.fetch, 60000); 

            // 5. Старт мережі
            NetworkWS.connect(); 

            // Відключення для тестування Exponential Backoff Reconnect
            document.getElementById('ws-status-panel').addEventListener('dblclick', () => {
                if(State.isOnline) NetworkWS.disconnect();
                else NetworkWS.connect();
            });
        });

    </script>
</body>
</html>
