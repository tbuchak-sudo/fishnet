<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agro-Controller PRO v4</title>
    
    <!-- PWA META ТЕГИ -->
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AgroPRO">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Шрифти -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        agro: {
                            50: '#f0fdf4', 100: '#dcfce7', 500: '#10b981', // emerald
                            600: '#059669', 700: '#047857', 800: '#065f46', 900: '#064e3b',
                        },
                        dark: {
                            800: '#1e293b', 900: '#0f172a', 950: '#020617'
                        }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'glow-green': '0 0 15px rgba(16, 185, 129, 0.4)',
                        'glow-red': '0 0 15px rgba(244, 63, 94, 0.4)',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .tab-content { display: none; opacity: 0; }
        .tab-content.active { 
            display: block; 
            animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }
        
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(249, 115, 22, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); }
        }
        .pwa-pulse { animation: pulse-ring 2s infinite; }
        
        /* Smooth progress bar transitions */
        .progress-bar-fill { transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex overflow-hidden w-full selection:bg-agro-500 selection:text-white">

    <!-- Мобільний Backdrop -->
    <div id="sidebar-backdrop" class="fixed inset-0 bg-dark-950/40 backdrop-blur-sm z-30 hidden lg:hidden transition-opacity duration-300 opacity-0" onclick="UI.toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-40 w-72 lg:w-64 bg-dark-900 text-slate-300 flex flex-col transition-transform duration-300 transform -translate-x-full lg:translate-x-0 shadow-2xl lg:shadow-none h-full border-r border-slate-800">
        <div class="p-6 border-b border-slate-800/60 flex items-center justify-between gap-3 bg-dark-950/30">
            <div class="flex items-center gap-3">
                <div class="bg-gradient-to-br from-agro-400 to-agro-600 p-2 rounded-xl text-white shadow-glow-green">
                    <i data-lucide="sprout" class="w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg text-white tracking-tight">AgroPRO <span class="text-agro-400 text-xs align-top">v4</span></h1>
                    <p class="text-[10px] text-slate-400 uppercase tracking-wider font-medium">Smart Farm Control</p>
                </div>
            </div>
            <button class="lg:hidden p-2 rounded-lg bg-slate-800 text-slate-300 hover:text-white" onclick="UI.toggleSidebar()">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <nav class="flex-1 p-4 space-y-1.5 flex flex-col overflow-y-auto mt-2">
            <button onclick="UI.switchTab('dashboard')" id="nav-dashboard" class="nav-btn group w-full flex items-center gap-3 px-4 py-3.5 rounded-xl bg-agro-500/10 text-agro-400 font-semibold transition-all">
                <i data-lucide="layout-dashboard" class="w-5 h-5 transition-transform group-hover:scale-110"></i>
                <span>Дашборд</span>
            </button>
            <button onclick="UI.switchTab('zones')" id="nav-zones" class="nav-btn group w-full flex items-center gap-3 px-4 py-3.5 rounded-xl hover:bg-slate-800 text-slate-400 font-medium transition-all">
                <i data-lucide="grid-3x3" class="w-5 h-5 transition-transform group-hover:scale-110"></i>
                <span>Зони поливу</span>
            </button>
            <button onclick="UI.switchTab('analytics')" id="nav-analytics" class="nav-btn group w-full flex items-center gap-3 px-4 py-3.5 rounded-xl hover:bg-slate-800 text-slate-400 font-medium transition-all">
                <i data-lucide="activity" class="w-5 h-5 transition-transform group-hover:scale-110"></i>
                <span>Аналітика</span>
            </button>
            
            <div class="mt-auto pt-6 pb-4 lg:pb-0">
                <button id="pwa-install-btn" class="hidden w-full flex items-center justify-center gap-2 px-4 py-3.5 rounded-xl bg-gradient-to-r from-orange-500 to-rose-500 text-white font-semibold transition-transform active:scale-95 shadow-lg shadow-orange-500/25">
                    <i data-lucide="download-cloud" class="w-5 h-5"></i>
                    <span>Встановити App</span>
                </button>
            </div>
        </nav>

        <div class="p-4 bg-dark-950/50 mt-auto border-t border-slate-800">
            <div class="bg-dark-800/50 border border-slate-700/50 rounded-xl p-3.5 flex flex-col gap-2 relative overflow-hidden group cursor-pointer" id="ws-status-panel" title="Подвійний клік для реконекту">
                <div class="flex items-center justify-between relative z-10">
                    <span class="text-xs font-medium text-slate-400 uppercase tracking-wider">Шлюз Зв'язку</span>
                    <span id="conn-indicator" class="flex h-2.5 w-2.5 relative">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-yellow-500"></span>

                    <i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> Ініціалізація...
                </div>
                <div id="reconnect-bar" class="absolute bottom-0 left-0 h-0.5 bg-rose-500 transition-all" style="width: 0%"></div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden w-full relative z-10">
        <!-- Header -->
        <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 px-5 md:px-8 py-4 flex justify-between items-center z-20 sticky top-0 shadow-sm">
            <div class="flex items-center gap-4">
                <button class="lg:hidden p-2 -ml-2 text-slate-500 rounded-xl hover:bg-slate-100 transition-colors" onclick="UI.toggleSidebar()">
                    <i data-lucide="menu-2" class="w-6 h-6"></i>
                </button>
                <div>
                    <h2 class="text-xl md:text-2xl font-bold text-slate-800 tracking-tight leading-none" id="page-title">Огляд системи</h2>
                </div>
            </div>
            
            <div class="flex items-center gap-3 md:gap-5">
                <!-- Weather Widget -->
                <div id="weather-status" class="flex items-center gap-2 text-xs md:text-sm font-medium bg-slate-100 text-slate-600 px-3 py-2 rounded-full border border-slate-200 transition-all duration-300 shadow-sm">
                    <i data-lucide="cloud" class="w-4 h-4 shrink-0"></i>
                    <span class="hidden sm:inline">Синхронізація...</span>
                </div>
                <!-- Profile -->
                <div class="w-10 h-10 shrink-0 rounded-full bg-gradient-to-br from-slate-100 to-slate-200 text-slate-600 flex items-center justify-center font-bold border border-slate-300 shadow-sm cursor-pointer hover:shadow-md transition-shadow">

                </div>

        </header>

        <!-- Scrollable Content -->
        <div class="flex-1 overflow-y-auto p-4 md:p-8 w-full scroll-smooth">
            
            <!-- ДАШБОРД -->
            <div id="tab-dashboard" class="tab-content active space-y-6 max-w-7xl mx-auto">
                <!-- KPI Grid -->
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                    
                    <!-- KPI 1 -->
                    <div class="glass-card p-6 rounded-3xl shadow-soft relative overflow-hidden group">
                        <div class="absolute top-0 right-0 p-6 opacity-10 transform translate-x-4 -translate-y-4 group-hover:scale-110 transition-transform duration-500">
                            <i data-lucide="droplets" class="w-24 h-24 text-blue-500"></i>
                        </div>
                        <div class="flex justify-between items-start mb-4 relative z-10">
                            <div class="p-3 bg-gradient-to-br from-blue-500 to-cyan-400 text-white rounded-2xl shadow-lg shadow-blue-500/30">
                                <i data-lucide="droplets" class="w-6 h-6"></i>
                            </div>
                        </div>
                        <div class="relative z-10">
                            <p class="text-sm text-slate-500 font-medium mb-1">Вологість (Сер. EMA)</p>
                            <h3 class="text-4xl font-black text-slate-800 tracking-tight"><span id="dash-moisture">--</span><span class="text-2xl text-slate-400 font-semibold ml-1">%</span></h3>
                        </div>
                    </div>

                    <!-- KPI 2 -->
                    <div class="glass-card p-6 rounded-3xl shadow-soft relative overflow-hidden group">
                        <div class="absolute top-0 right-0 p-6 opacity-10 transform translate-x-4 -translate-y-4 group-hover:scale-110 transition-transform duration-500">
                            <i data-lucide="thermometer-sun" class="w-24 h-24 text-orange-500"></i>
                        </div>
                        <div class="flex justify-between items-start mb-4 relative z-10">
                            <div class="p-3 bg-gradient-to-br from-orange-400 to-rose-400 text-white rounded-2xl shadow-lg shadow-orange-500/30">
                                <i data-lucide="thermometer-sun" class="w-6 h-6"></i>
                            </div>
                        </div>
                        <div class="relative z-10">
                            <p class="text-sm text-slate-500 font-medium mb-1">Температура (Сер.)</p>
                            <h3 class="text-4xl font-black text-slate-800 tracking-tight"><span id="dash-temp">--</span><span class="text-2xl text-slate-400 font-semibold ml-1">°C</span></h3>
                        </div>
                    </div>

                    <!-- KPI 3 -->
                    <div class="glass-card p-6 rounded-3xl shadow-soft relative overflow-hidden group">
                        <div class="absolute top-0 right-0 p-6 opacity-10 transform translate-x-4 -translate-y-4 group-hover:scale-110 transition-transform duration-500">
                            <i data-lucide="wind" class="w-24 h-24 text-purple-500"></i>
                        </div>
                        <div class="flex justify-between items-start mb-4 relative z-10">
                            <div class="p-3 bg-gradient-to-br from-purple-500 to-indigo-500 text-white rounded-2xl shadow-lg shadow-purple-500/30">
                                <i data-lucide="wind" class="w-6 h-6"></i>
                            </div>
                        </div>
                        <div class="relative z-10">
                            <p class="text-sm text-slate-500 font-medium mb-1">Дефіцит тиску (VPD)</p>
                            <h3 class="text-4xl font-black text-slate-800 tracking-tight"><span id="dash-vpd">--</span><span class="text-xl text-slate-400 font-semibold ml-1">kPa</span></h3>
                        </div>
                    </div>

                    <!-- KPI 4 (Tank) -->
                    <div class="glass-card p-6 rounded-3xl shadow-soft relative overflow-hidden group flex flex-col justify-between">
                        <div class="flex justify-between items-start relative z-10">
                            <div class="p-3 bg-gradient-to-br from-teal-400 to-emerald-500 text-white rounded-2xl shadow-lg shadow-emerald-500/30">
                                <i data-lucide="container" class="w-6 h-6"></i>
                            </div>
                            <div class="text-right">
                                <p class="text-sm text-slate-500 font-medium mb-1">Резервуар</p>
                                <h3 class="text-3xl font-black text-slate-800 tracking-tight"><span id="dash-tank">--</span><span class="text-lg text-slate-400 font-semibold ml-1">Л</span></h3>
                            </div>
                        </div>
                        <div class="relative z-10 mt-6 bg-slate-100 rounded-full h-2.5 w-full overflow-hidden">
                            <div id="tank-bar" class="progress-bar-fill h-full bg-gradient-to-r from-emerald-400 to-teal-500 rounded-full" style="width: 100%"></div>
                        </div>
                    </div>
                </div>

                <!-- Системні логи -->
                <div class="glass-card rounded-3xl shadow-soft overflow-hidden">
                    <div class="border-b border-slate-100 px-6 py-4 bg-white/50 flex items-center justify-between">
                        <h3 class="font-bold text-slate-800 flex items-center gap-2">
                            <i data-lucide="terminal" class="w-5 h-5 text-slate-400"></i> Журнал операцій системи
                        </h3>
                        <div class="flex gap-1.5">
                            <div class="w-3 h-3 rounded-full bg-rose-400"></div>
                            <div class="w-3 h-3 rounded-full bg-amber-400"></div>
                            <div class="w-3 h-3 rounded-full bg-emerald-400"></div>
                        </div>
                    </div>
                    <div class="p-5 bg-dark-950 text-emerald-400 font-mono text-[11px] md:text-sm h-48 overflow-y-auto leading-relaxed" id="system-logs">
                        <!-- Логи генеруватимуться тут -->
                    </div>
                </div>
            </div>

            <!-- ЗОНИ ПОЛИВУ -->
            <div id="tab-zones" class="tab-content space-y-6 max-w-7xl mx-auto">
                <div class="grid grid-cols-1 xl:grid-cols-2 gap-6" id="zones-container">
                    <!-- Картки зон генеруються динамічно через JS -->
                </div>
            </div>

            <!-- АНАЛІТИКА -->
            <div id="tab-analytics" class="tab-content max-w-7xl mx-auto">
                <div class="glass-card p-6 rounded-3xl shadow-soft border border-slate-200">
                    <div class="flex justify-between items-center mb-6">
                        <div>
                            <h3 class="font-bold text-xl text-slate-800">Телеметрія реального часу</h3>
                            <p class="text-sm text-slate-500 mt-1">Зона 1: Кореляція вологості та VPD</p>
                        </div>
                        <div class="p-2 bg-slate-100 rounded-lg text-slate-600"><i data-lucide="bar-chart-2"></i></div>
                    </div>
                    <div class="w-full h-[350px] md:h-[450px]">
                        <canvas id="mainChart"></canvas>
                    </div>
                </div>
            </div>
            
            <div class="h-10"></div> <!-- Spacer -->
        </div>
    </main>

    <!-- JS ЛОГІКА -->
    <script>
        // --- 1. БЕЗПЕКА: AUTH FLOW ---
        const Auth = {
            getToken() {
                let token = localStorage.getItem('agro_jwt_token');
                if (!token) {
                    token = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.simulated_token_" + Date.now();
                    localStorage.setItem('agro_jwt_token', token);
                    Logger.add('AUTH', 'Згенеровано новий JWT токен сесії.');
                }
                return token;
            },
            getHeaders() {
                return { 'Authorization': `Bearer ${this.getToken()}` };
            }
        };

        // --- 2. PWA ---
        const PWA = {
            deferredPrompt: null,

            init() {
                this.injectManifest();
                this.registerServiceWorker();
                this.setupInstallPrompt();
            },

            injectManifest() {
                const manifest = {
                    name: "Agro-Controller PRO",
                    short_name: "AgroPRO",
                    start_url: window.location.href,
                    display: "standalone",
                    background_color: "#f8fafc",
                    theme_color: "#0f172a",
                    icons: [{
                        src: "data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2310b981'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z'/%3E%3C/svg%3E",
                        sizes: "192x192",
                        type: "image/svg+xml",
                        purpose: "any maskable"
                    }]
                };

                const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
                const manifestUrl = URL.createObjectURL(blob);
                const link = document.createElement('link');
                link.rel = 'manifest';
                link.href = manifestUrl;
                document.head.appendChild(link);
            },

            registerServiceWorker() {
                if ('serviceWorker' in navigator) {
                    const swCode = `
                        const CACHE_NAME = 'agro-pro-cache-v4.1';
                        const ASSETS = [ location.href ];
                        self.addEventListener('install', (e) => {
                            e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(ASSETS)));
                            self.skipWaiting();
                        });
                        self.addEventListener('activate', (e) => e.waitUntil(clients.claim()));
                        self.addEventListener('fetch', (e) => {
                            e.respondWith(caches.match(e.request).then(res => res || fetch(e.request).catch(() => new Response('Network Error'))));
                        });
                    `;
                    const swBlob = new Blob([swCode], { type: 'application/javascript' });
                    const swUrl = URL.createObjectURL(swBlob);

                    navigator.serviceWorker.register(swUrl).catch(err => console.error('[PWA] SW Error:', err));
                }
            },

            setupInstallPrompt() {
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    this.deferredPrompt = e;
                    const installBtn = document.getElementById('pwa-install-btn');
                    if (installBtn) {
                        installBtn.classList.remove('hidden');
                        installBtn.addEventListener('click', async () => {
                            installBtn.classList.add('hidden');
                            this.deferredPrompt.prompt();
                            const { outcome } = await this.deferredPrompt.userChoice;
                            if (outcome === 'accepted') Logger.add('INFO', '🎉 Agro-Controller PWA встановлено.');
                            this.deferredPrompt = null;
                        });
                    }
                });
                window.addEventListener('appinstalled', () => document.getElementById('pwa-install-btn').classList.add('hidden'));
            }
        };

        // --- 3. CONFIG та Стан ---
        const CONFIG = {
            VPD_OPTIMAL: [0.8, 1.2],
            HYSTERESIS: { ON: 45, OFF: 65 },
            WS_PING_INTERVAL: 2000,
            TOGGLE_DELAY: 5000, 
            MAX_CHART_POINTS: 30,
            TANK_MAX: 1000,
            TANK_MIN: 100,
            MAX_MISSED_PINGS: 3 
        };

        const Logger = {
            logs: [],
            add(level, message) {
                const now = new Date();
                const time = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
                const logEntry = `[${time}] [${level}] ${message}`;
                
                this.logs.unshift(logEntry);
                if (this.logs.length > 50) this.logs.pop(); 
                
                requestAnimationFrame(() => {
                    const logsContainer = document.getElementById('system-logs');
                    if (logsContainer) {
                        let html = '';
                        this.logs.forEach(log => {
                            const color = log.includes('[ERROR]') ? 'text-rose-400' : 
                                          log.includes('[WARN]') ? 'text-amber-400' : 
                                          log.includes('[AUTH]') ? 'text-purple-400' :
                                          log.includes('[NET]') ? 'text-cyan-400' : 'text-emerald-400';
                            html += `<div class="${color} break-words whitespace-pre-wrap py-0.5">${log}</div>`;
                        });
                        logsContainer.innerHTML = html;
                    }
                });
            }
        };

        let saveTimeout;
        const Storage = {
            scheduleSave() {
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(this.save, 2000);
            },
            save() {
                const dataToSave = { tankLevel: State.tankLevel, zones: State.zones };
                localStorage.setItem('agroStatePRO_v4', JSON.stringify(dataToSave));
            },
            load() {
                const saved = localStorage.getItem('agroStatePRO_v4');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (parsed.tankLevel) State.tankLevel = parsed.tankLevel;
                        if (parsed.zones) {
                            Object.keys(parsed.zones).forEach(key => {
                                if (State.zones[key]) {
                                    State.zones[key].moisture = parsed.zones[key].moisture;
                                    State.zones[key].rawMoisture = parsed.zones[key].moisture;
                                    State.zones[key].temp = parsed.zones[key].temp;
                                    State.zones[key].isWatering = false; 
                                    State.zones[key].status = 'IDLE';
                                    State.zones[key].missedPings = 0; 
                                }
                            });
                        }
                        Logger.add('INFO', 'Стан відновлено з кешу');
                    } catch (e) { Logger.add('ERROR', 'Помилка читання кешу'); }
                }
            }
        };

        const State = {
            isOnline: false,
            weather: { isRaining: false, probability: 0, rainInMinutes: 999 },
            tankLevel: 350,
            zones: {
                z1: { id: 'z1', name: 'Теплиця (Огірки)', loraId: 'NET-A1', rawMoisture: 48, moisture: 48, airHumidity: 65, trend: 0, temp: 24.5, vpd: 0.9, isWatering: false, status: 'IDLE', lastToggleTime: 0, lastSeen: Date.now(), missedPings: 0 },
                z2: { id: 'z2', name: 'Відкритий ґрунт (Томати)', loraId: 'NET-B2', rawMoisture: 62, moisture: 62, airHumidity: 55, trend: 0, temp: 26.2, vpd: 1.3, isWatering: false, status: 'IDLE', lastToggleTime: 0, lastSeen: Date.now(), missedPings: 0 }
            },
            chartInstance: null
        };

        const DOM = { zones: {} };

        // --- 4. МАТЕМАТИКА VPD ---
        const AgroMath = {
            calculateVPD(tempCelsius, relHumidity) {
                const svp = 0.61078 * Math.exp((17.27 * tempCelsius) / (tempCelsius + 237.3));
                const avp = svp * (relHumidity / 100);
                return (svp - avp);
            }
        };

        // --- 5. МЕРЕЖА ---
        const NetworkWS = {
            intervalId: null,
            reconnectTimer: null,
            retries: 0,
            
            connect() {
                if (this.reconnectTimer) clearTimeout(this.reconnectTimer);
                UI.setConnectionStatus('connecting');
                Logger.add('NET', 'Ініціалізація Secure WS Gateway...');
                
                setTimeout(() => {
                    State.isOnline = true;
                    this.retries = 0; 
                    document.getElementById('reconnect-bar').style.width = '0%';
                    UI.setConnectionStatus('connected');
                    Logger.add('NET', 'З\'єднання встановлено (128ms)');
                    
                    Object.values(State.zones).forEach(z => { z.lastSeen = Date.now(); z.missedPings = 0; });
                    this.intervalId = setInterval(() => this.simulateIncomingData(), CONFIG.WS_PING_INTERVAL);
                }, 1200);
            },
            
            disconnect() {
                State.isOnline = false;
                clearInterval(this.intervalId);
                UI.setConnectionStatus('disconnected');
                
                const delay = Math.min(30000, 1000 * Math.pow(2, this.retries));
                Logger.add('ERROR', `Втрата пакетів. Відновлення через ${(delay/1000).toFixed(1)}с`);
                
                const bar = document.getElementById('reconnect-bar');
                bar.style.transition = `width ${delay}ms linear`;
                bar.style.width = '100%';
                
                this.reconnectTimer = setTimeout(() => {
                    bar.style.transition = 'none';
                    bar.style.width = '0%';
                    this.retries++;
                    this.connect();
                }, delay);
                
                UI.render();
            },

            async send(command, payload) {
                Logger.add('CMD', `TX [${command}] -> ${payload.id}`);
                return new Promise((resolve) => {
                    setTimeout(() => resolve({ success: true }), 600 + Math.random() * 400);
                });
            },

            simulateIncomingData() {
                if (document.hidden) return; 

                Object.values(State.zones).forEach(zone => {
                    const prevMoisture = zone.moisture;
                    const noiseM = (Math.random() - 0.5) * 4;
                    
                    if (zone.isWatering) {
                        zone.rawMoisture += 2.5 + noiseM;
                        State.tankLevel -= 2; 
                        zone.airHumidity += 0.5; 
                    } else {
                        zone.rawMoisture -= 0.5 + noiseM;
                        zone.airHumidity -= 0.2; 
                    }
                    
                    zone.rawMoisture = Math.max(0, Math.min(100, zone.rawMoisture));
                    zone.airHumidity = Math.max(30, Math.min(100, zone.airHumidity));

                    const diff = Math.abs(zone.rawMoisture - zone.moisture);
                    const dynamicAlpha = diff > 4 ? 0.4 : 0.1;
                    zone.moisture = (dynamicAlpha * zone.rawMoisture) + ((1 - dynamicAlpha) * zone.moisture);

                    zone.trend = zone.moisture - prevMoisture;
                    zone.temp += (Math.random() * 0.4 - 0.2);
                    zone.vpd = AgroMath.calculateVPD(zone.temp, zone.airHumidity);

                    zone.lastSeen = Date.now();
                    zone.missedPings = 0; 
                });

                Storage.scheduleSave();
                Logic.processSensors();
                UI.render();
            }
        };

        const WeatherService = {
            async fetch() {
                State.weather.probability = Math.floor(Math.random() * 100);
                State.weather.rainInMinutes = Math.floor(Math.random() * 120);
                State.weather.isRaining = State.weather.probability > 80 && State.weather.rainInMinutes === 0; 
                UI.updateWeatherWidget();
            }
        };

        // --- 6. LOGIC ---
        const Logic = {
            shouldStartWatering(zone) {
                if (State.weather.rainInMinutes < 60 && State.weather.probability > 60) return false;
                if (State.tankLevel < CONFIG.TANK_MIN) return false;
                
                let dynamicOnThreshold = CONFIG.HYSTERESIS.ON;
                if (zone.vpd > 1.6) dynamicOnThreshold += 10; 
                else if (zone.vpd < 0.7) dynamicOnThreshold -= 5;  
                if (zone.temp > 28 && State.weather.probability < 30) dynamicOnThreshold += 5; 

                const predictedMoisture = zone.moisture + (zone.trend * 15);
                return predictedMoisture < dynamicOnThreshold;
            },

            processSensors() {
                const now = Date.now();

                Object.values(State.zones).forEach(zone => {
                    if (now - zone.lastSeen > CONFIG.WS_PING_INTERVAL * 2 && State.isOnline) {
                        zone.missedPings++;
                        if (zone.missedPings >= CONFIG.MAX_MISSED_PINGS) {
                            if (zone.isWatering) {
                                zone.isWatering = false;
                                NetworkWS.send('RELAY_SET', { id: zone.id, state: false });
                            }
                            zone.status = 'OFFLINE';
                            return; 
                        }
                    }

                    if (State.tankLevel < CONFIG.TANK_MIN) {
                        if (zone.isWatering) {
                            zone.isWatering = false;
                            NetworkWS.send('RELAY_SET', { id: zone.id, state: false });
                        }
                        zone.status = 'LOW_WATER';
                    } else if(zone.status !== 'OFFLINE') {
                        const canToggle = (now - zone.lastToggleTime > CONFIG.TOGGLE_DELAY);

                        if (!zone.isWatering && this.shouldStartWatering(zone) && canToggle) {
                            zone.isWatering = true;
                            zone.lastToggleTime = now;
                            NetworkWS.send('RELAY_SET', { id: zone.id, state: true });
                        } else if (zone.isWatering && zone.moisture >= CONFIG.HYSTERESIS.OFF && canToggle) {
                            zone.isWatering = false;
                            zone.lastToggleTime = now;
                            NetworkWS.send('RELAY_SET', { id: zone.id, state: false });
                        }
                        zone.status = zone.isWatering ? 'WATERING' : 'IDLE';
                    }
                });
            },

            async handleManualWatering(zoneId) {
                if (!State.isOnline) { alert("Немає з'єднання з сервером"); return; }
                const zone = State.zones[zoneId];
                const now = Date.now();
                
                if (zone.status === 'OFFLINE') { alert("Вузол не відповідає"); return; }
                if (now - zone.lastToggleTime < CONFIG.TOGGLE_DELAY) { return; }
                if (State.tankLevel < CONFIG.TANK_MIN && !zone.isWatering) { alert("Критичний рівень води в баку"); return; }

                const newState = !zone.isWatering;
                const btnObj = DOM.zones[zoneId].btn;
                if(btnObj) {
                    btnObj.disabled = true;
                    DOM.zones[zoneId].btnIcon.classList.add('animate-spin');
                }

                const res = await NetworkWS.send('RELAY_SET', { id: zoneId, state: newState });
                
                if (res.success) {
                    zone.isWatering = newState;
                    zone.status = zone.isWatering ? 'WATERING' : 'IDLE';
                    zone.lastToggleTime = now;
                    UI.render(); 
                }
                
                if(btnObj) {
                    btnObj.disabled = false;
                    DOM.zones[zoneId].btnIcon.classList.remove('animate-spin');
                }
            }
        };

        // --- 7. UI ---
        const UI = {
            lastValues: {},
            titles: { 'dashboard': 'Огляд системи', 'zones': 'Управління клапанами', 'analytics': 'Аналітичні дані' },

            toggleSidebar() {
                const sidebar = document.getElementById('sidebar');
                const backdrop = document.getElementById('sidebar-backdrop');
                
                sidebar.classList.toggle('-translate-x-full');

                    setTimeout(() => backdrop.classList.add('hidden'), 300);

                    setTimeout(() => backdrop.classList.remove('opacity-0'), 10);
                }
            },

            init() {
                DOM.dashMoisture = document.getElementById('dash-moisture');

                DOM.tankBar = document.getElementById('tank-bar');
                DOM.connIndicator = document.getElementById('conn-indicator');
                DOM.connText = document.getElementById('conn-text');
                DOM.weatherStatus = document.getElementById('weather-status');

                this.initZonesUI();
                this.initChart();
            },

            initZonesUI() {
                const container = document.getElementById('zones-container');

                            </div>

                        <!-- Body -->
                        <div class="p-6 flex-1 flex flex-col gap-6">

                            <div>

                                <div class="bg-slate-50 border border-slate-100 rounded-2xl p-4 flex items-center gap-3">
                                    <div class="p-2 bg-cyan-100 text-cyan-500 rounded-xl"><i data-lucide="cloud-fog" class="w-5 h-5"></i></div>
                                    <div>
                                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Повітря</p>
                                        <p class="text-xl font-bold text-slate-700"><span id="${zone.id}-air">--</span><span class="text-sm text-slate-400">%</span></p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Footer / Actions -->
                        <div class="px-6 py-4 bg-slate-50/50 border-t border-slate-100 flex justify-end">
                            <button onclick="Logic.handleManualWatering('${zone.id}')" id="btn-water-${zone.id}" class="group px-6 py-3 rounded-2xl font-bold transition-all duration-300 flex items-center gap-2 text-white bg-slate-800 hover:bg-slate-900 shadow-md active:scale-95">
                                <i data-lucide="power" id="btn-icon-${zone.id}" class="w-4 h-4 transition-transform group-hover:scale-110"></i> 
                                <span id="btn-text-${zone.id}">Увімкнути</span>
                            </button>
                        </div>
                    </div>`;
                    container.insertAdjacentHTML('beforeend', html);
                    
                    DOM.zones[zone.id] = {
                        moisture: document.getElementById(`${zone.id}-moisture`),
                        air: document.getElementById(`${zone.id}-air`),
                        bar: document.getElementById(`${zone.id}-bar`),
                        temp: document.getElementById(`${zone.id}-temp`),
                        statusBadge: document.getElementById(`${zone.id}-status-badge`),
                        btn: document.getElementById(`btn-water-${zone.id}`),
                        btnText: document.getElementById(`btn-text-${zone.id}`),
                        btnIcon: document.getElementById(`btn-icon-${zone.id}`),
                        indicator: document.getElementById(`${zone.id}-indicator`),
                        indicatorBg: document.getElementById(`${zone.id}-indicator-bg`)
                    };
                });
                lucide.createIcons();
            },

            switchTab(tabId) {
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.remove('bg-agro-500/10', 'text-agro-400');
                    btn.classList.add('text-slate-400', 'hover:bg-slate-800');
                });
                
                const activeBtn = document.getElementById('nav-' + tabId);
                if(activeBtn) {
                    activeBtn.classList.remove('text-slate-400', 'hover:bg-slate-800');
                    activeBtn.classList.add('bg-agro-500/10', 'text-agro-400');
                }
                document.getElementById('page-title').innerText = this.titles[tabId];

                document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
                document.getElementById('tab-' + tabId).classList.add('active');
                
                if(window.innerWidth < 1024) {
                    const sidebar = document.getElementById('sidebar');
                    if(!sidebar.classList.contains('-translate-x-full')) this.toggleSidebar();
                }
            },

            setConnectionStatus(status) {
                requestAnimationFrame(() => {
                    if (status === 'connected') {
                        DOM.connIndicator.innerHTML = '<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>';
                        DOM.connText.innerHTML = '<i data-lucide="wifi" class="w-3.5 h-3.5"></i> Активно';
                        DOM.connText.className = "text-xs text-emerald-400 font-medium flex items-center gap-1.5 relative z-10 mt-0.5";
                    } else if (status === 'disconnected') {
                        DOM.connIndicator.innerHTML = '<span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-rose-500"></span>';
                        DOM.connText.innerHTML = '<i data-lucide="wifi-off" class="w-3.5 h-3.5"></i> Зрив зв\'язку';
                        DOM.connText.className = "text-xs text-rose-400 font-medium flex items-center gap-1.5 relative z-10 mt-0.5";
                    } else {
                        DOM.connIndicator.innerHTML = '<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-amber-500"></span>';
                        DOM.connText.innerHTML = '<i data-lucide="loader" class="w-3.5 h-3.5 animate-spin"></i> Пошук шлюзу...';
                        DOM.connText.className = "text-xs text-amber-400 font-medium flex items-center gap-1.5 relative z-10 mt-0.5";
                    }
                    lucide.createIcons();
                });
            },

            updateWeatherWidget() {
                const isBlock = State.weather.rainInMinutes < 60 && State.weather.probability > 60;
                const newClass = isBlock 
                    ? "flex items-center gap-2 text-xs md:text-sm font-semibold text-blue-700 bg-blue-100 px-4 py-2 rounded-full transition-all shadow-sm"
                    : "flex items-center gap-2 text-xs md:text-sm font-semibold text-amber-700 bg-amber-100 px-4 py-2 rounded-full transition-all shadow-sm";
                
                if(this.lastValues.weatherClass !== newClass) {
                    this.lastValues.weatherClass = newClass;
                    requestAnimationFrame(() => {
                        DOM.weatherStatus.className = newClass;
                        DOM.weatherStatus.innerHTML = isBlock
                            ? `<i data-lucide="cloud-rain" class="w-4 h-4 shrink-0"></i><span class="hidden sm:inline">Дощ через ${State.weather.rainInMinutes} хв</span>`
                            : `<i data-lucide="sun" class="w-4 h-4 shrink-0"></i><span class="hidden sm:inline">Ясно (API)</span>`;
                        lucide.createIcons();
                    });
                }
            },

            render() {
                const tnkInt = Math.floor(State.tankLevel);
                let avgMoisture = 0, avgTemp = 0, maxVpd = 0;
                const zonesArr = Object.values(State.zones);
                
                zonesArr.forEach(z => {
                    avgMoisture += z.moisture;
                    avgTemp += z.temp;
                    if(z.vpd > maxVpd) maxVpd = z.vpd;
                });
                avgMoisture = Math.floor(avgMoisture / zonesArr.length);
                avgTemp = (avgTemp / zonesArr.length).toFixed(1);
                maxVpd = maxVpd.toFixed(2);

                requestAnimationFrame(() => {
                    if (this.lastValues.avgM !== avgMoisture) { DOM.dashMoisture.innerText = avgMoisture; this.lastValues.avgM = avgMoisture; }
                    if (this.lastValues.avgT !== avgTemp) { DOM.dashTemp.innerText = avgTemp; this.lastValues.avgT = avgTemp; }
                    if (this.lastValues.maxV !== maxVpd) { DOM.dashVpd.innerText = maxVpd; this.lastValues.maxV = maxVpd; }
                    if (this.lastValues.tank !== tnkInt) { 
                        DOM.dashTank.innerText = tnkInt; 
                        DOM.tankBar.style.width = `${(tnkInt/CONFIG.TANK_MAX)*100}%`;
                        
                        // Кольори для баку
                        DOM.tankBar.className = tnkInt < CONFIG.TANK_MIN 
                            ? 'progress-bar-fill h-full bg-gradient-to-r from-rose-500 to-red-600 rounded-full'
                            : 'progress-bar-fill h-full bg-gradient-to-r from-emerald-400 to-teal-500 rounded-full';
                        this.lastValues.tank = tnkInt; 
                    }

                    zonesArr.forEach(z => {
                        const domZ = DOM.zones[z.id];
                        if (!domZ) return;

                        const mInt = Math.floor(z.moisture);
                        const aInt = Math.floor(z.airHumidity);
                        const tFixed = z.temp.toFixed(1);
                        const cacheKey = `z_${z.id}`;

                        if(!this.lastValues[cacheKey]) this.lastValues[cacheKey] = {};

                        if (this.lastValues[cacheKey].moisture !== mInt) {
                            domZ.moisture.innerText = mInt;
                            domZ.bar.style.width = `${mInt}%`;
                            this.lastValues[cacheKey].moisture = mInt;
                        }
                        if (this.lastValues[cacheKey].air !== aInt) { domZ.air.innerText = aInt; this.lastValues[cacheKey].air = aInt; }
                        if (this.lastValues[cacheKey].temp !== tFixed) { domZ.temp.innerText = tFixed; this.lastValues[cacheKey].temp = tFixed; }

                        if (this.lastValues[cacheKey].status !== z.status || !State.isOnline) {
                            const baseBtnClass = "group px-6 py-3 rounded-2xl font-bold transition-all duration-300 flex items-center gap-2 text-white shadow-md active:scale-95 shrink-0";
                            domZ.btn.disabled = false;

                            if (!State.isOnline || z.status === 'OFFLINE') {
                                domZ.statusBadge.innerHTML = 'Офлайн';
                                domZ.statusBadge.className = 'px-3 py-1 rounded-full bg-slate-100 border border-slate-200 text-xs font-semibold text-slate-500';
                                domZ.btn.className = `${baseBtnClass} bg-slate-300 shadow-none text-slate-500 cursor-not-allowed`;
                                domZ.btn.disabled = true;
                                domZ.btnText.innerText = "Недоступно";
                                domZ.indicator.className = "w-3.5 h-3.5 rounded-full bg-slate-300 relative z-10 transition-colors duration-300";
                                domZ.indicatorBg.className = "absolute inset-0 rounded-full opacity-0";
                            }
                            else if (z.status === 'LOW_WATER') {
                                domZ.statusBadge.innerHTML = 'Блок (Бак)';
                                domZ.statusBadge.className = 'px-3 py-1 rounded-full bg-rose-50 border border-rose-200 text-xs font-bold text-rose-600';
                                domZ.btn.className = `${baseBtnClass} bg-rose-200 shadow-none text-rose-500 cursor-not-allowed`;
                                domZ.btn.disabled = true; 
                                domZ.btnText.innerText = "Заблоковано";
                                domZ.indicator.className = "w-3.5 h-3.5 rounded-full bg-rose-500 relative z-10 transition-colors duration-300";
                                domZ.indicatorBg.className = "absolute inset-0 rounded-full opacity-20 bg-rose-500";
                            } else if (z.status === 'WATERING') {
                                domZ.statusBadge.innerHTML = '<span class="flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></span> Полив активний</span>';
                                domZ.statusBadge.className = 'px-3 py-1 rounded-full bg-blue-50 border border-blue-200 text-xs font-bold text-blue-600';
                                domZ.btn.className = `${baseBtnClass} bg-gradient-to-r from-rose-500 to-red-600 shadow-rose-500/30 hover:shadow-rose-500/50`;
                                domZ.btnText.innerText = "Зупинити";
                                domZ.indicator.className = "w-3.5 h-3.5 rounded-full bg-blue-500 relative z-10 transition-colors duration-300 animate-pulse";
                                domZ.indicatorBg.className = "absolute inset-0 rounded-full opacity-30 bg-blue-500 animate-ping";
                            } else {
                                domZ.statusBadge.innerHTML = 'Готовий';
                                domZ.statusBadge.className = 'px-3 py-1 rounded-full bg-emerald-50 border border-emerald-200 text-xs font-bold text-emerald-600';
                                domZ.btn.className = `${baseBtnClass} bg-gradient-to-r from-emerald-500 to-teal-500 shadow-emerald-500/30 hover:shadow-emerald-500/50`;
                                domZ.btnText.innerText = "Увімкнути";
                                domZ.indicator.className = "w-3.5 h-3.5 rounded-full bg-emerald-500 relative z-10 transition-colors duration-300";
                                domZ.indicatorBg.className = "absolute inset-0 rounded-full opacity-20 bg-emerald-500";
                            }
                            this.lastValues[cacheKey].status = z.status;
                        }
                    });
                });

                this.updateChartLive(State.zones.z1.moisture, State.zones.z1.vpd);
            },

            initChart() {
                const ctx = document.getElementById('mainChart').getContext('2d');
                
                // Стилізація графіку під новий дизайн
                Chart.defaults.font.family = "'Inter', sans-serif";

                State.chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {

                                backgroundColor: 'rgba(59, 130, 246, 0.1)',

                                pointBackgroundColor: '#fff',
                                pointBorderColor: '#3b82f6',
                                pointBorderWidth: 2,
                                pointRadius: 3,
                                yAxisID: 'y', tension: 0.4, fill: true
                            },
                            {
                                label: 'VPD (kPa)', data: [],
                                borderColor: '#8b5cf6', // violet-500
                                borderWidth: 2,
                                pointRadius: 0,
                                yAxisID: 'y1', tension: 0.4, borderDash: [5, 5]
                            }
                        ]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false, animation: { duration: 0 },
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 8, font: { weight: '600' } } },

                            x: { grid: { display: false } },
                            y: { min: 0, max: 100, border: { display: false }, grid: { color: '#f1f5f9' } },
                            y1: { position: 'right', min: 0, max: 2.5, border: { display: false }, grid: { drawOnChartArea: false } }
                        }
                    }
                });
            },

            updateChartLive(moisture, vpd) {
                if (!State.chartInstance || !State.isOnline) return;

                const now = new Date();
                const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2, '0')}`;
                const data = State.chartInstance.data;

                data.labels.push(timeStr);
                data.datasets[0].data.push(moisture);
                data.datasets[1].data.push(vpd.toFixed(2)); 

                if (data.labels.length > CONFIG.MAX_CHART_POINTS) {
                    data.labels.shift();
                    data.datasets[0].data.shift();
                    data.datasets[1].data.shift();
                }

                State.chartInstance.update('none');
            }
        };

        // --- 8. APP INIT ---
        document.addEventListener("DOMContentLoaded", async () => {
            Logger.add('INFO', 'Boot: AgroPRO v4.1 (Neo Glass Edition)');
            
            Auth.getToken();
            PWA.init();
            Storage.load(); 
            UI.init();
            
            await WeatherService.fetch();
            setInterval(WeatherService.fetch, 60000); 

            NetworkWS.connect(); 

            document.getElementById('ws-status-panel').addEventListener('dblclick', () => {
                if(State.isOnline) NetworkWS.disconnect();
                else NetworkWS.connect();
            });
        });

    </script>
</body>
</html>
